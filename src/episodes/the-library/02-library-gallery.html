<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The ED visual library</title>
<style>
  body { font: 13px/1.5 Inter, ui-sans-serif, system-ui, sans-serif; background: #0b1220; color: #e2e8f0; margin: 0; padding: 18px; }
  h1 { font-weight: 600; font-size: 1.15rem; margin: 0 0 2px; }
  p.sub { color: #94a3b8; margin: 0 0 16px; font-size: 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 14px; }
  .brick { background: #0f172a; border: 1px solid #1e293b; border-radius: 10px; padding: 16px; }
  .brick .nm { font-weight: 600; color: #f1f5f9; }
  .brick .id { font-family: ui-monospace, monospace; font-size: 10px; color: #0066CC; margin-bottom: 12px; }
  .brick .contract { color: #94a3b8; font-size: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #1e293b; }
  .badge { display: inline-block; font-family: ui-monospace, monospace; font-size: 9px; letter-spacing: .1em; color: #28A745; border: 1px solid rgba(40,167,69,.4); border-radius: 3px; padding: 1px 5px; margin-left: 6px; }
  .pv-kpi { display:flex; gap:14px; }
  .pv-kpi .v { font-size:1.4rem; font-weight:700; color:#f1f5f9; }
  .pv-kpi .l { color:#64748b; font-size:10px; }
  .pv-wf { display:flex; align-items:flex-end; gap:4px; height:48px; }
  .pv-gauge { font-size:1.6rem; font-weight:700; color:#28A745; }
  .pv-heat { display:grid; grid-template-columns:repeat(8,1fr); gap:2px; }
  .pv-heat i { aspect-ratio:1; border-radius:1px; }
  .pv-slicer { border:1px solid #1e293b; border-radius:5px; padding:6px 8px; color:#cbd5e1; font-size:11px; display:flex; justify-content:space-between; }
</style>
</head>
<body>
<h1>The ED visual library</h1>
<p class="sub">Five governed modules from the template, one brand (#0066CC), generated from config. Reports are assembled from these — not hand-built. Every module carries a contract.</p>
<div class="grid" id="grid"></div>
<script>
const G="#28A745", R="#DC3545", B="#0066CC";
const LIBRARY = [
  { id:"kpi_strip", name:"ED KPI Strip", contract:"Patient count must be DISTINCTCOUNT; SLA threshold from parameters.",
    preview:'<div class="pv-kpi"><div><div class="v">4,120</div><div class="l">Patients</div></div><div><div class="v">26.4</div><div class="l">Avg wait</div></div><div><div class="v" style="color:#28A745">91%</div><div class="l">&lt;30 min</div></div></div>' },
  { id:"variance_waterfall", name:"Monthly Variance Waterfall", contract:"Variance coloured by meaning; polarity declared, never author-picked.",
    preview:'<div class="pv-wf">'+[[20,G],[16,R],[24,G],[22,G],[28,G],[31,G]].map(([h,c])=>'<i style="flex:1;height:'+(h*1.4)+'px;background:'+c+';border-radius:2px 2px 0 0"></i>').join('')+'</div>' },
  { id:"sla_gauge", name:"SLA Compliance Gauge", contract:"Colour zones from config (70/85); target parameterised, not hard-coded.",
    preview:'<div class="pv-gauge">91% <span style="font-size:11px;color:#64748b">/ 85% target</span></div>' },
  { id:"day_hour_heatmap", name:"Day × Hour Heatmap", contract:"DISTINCTCOUNT of patients; sequential scale; peak periods surfaced.",
    preview:'<div class="pv-heat">'+Array.from({length:24},(_,i)=>{const v=Math.random();return '<i style="background:rgba(0,102,204,'+(0.15+v*0.85).toFixed(2)+')"></i>';}).join('')+'</div>' },
  { id:"month_year_slicer", name:"Month-Year Slicer", contract:"Bound to the Calendar table — never a raw DateTime column.",
    preview:'<div class="pv-slicer"><span>Month-Year</span><span style="color:#64748b">May 2026 ▾</span></div>' }
];
const grid=document.getElementById("grid");
LIBRARY.forEach(m=>{
  const el=document.createElement("div"); el.className="brick";
  el.innerHTML='<div class="nm">'+m.name+'<span class="badge">GOVERNED</span></div>'+
    '<div class="id">'+m.id+'</div>'+m.preview+
    '<div class="contract">'+m.contract+'</div>';
  grid.appendChild(el);
});
</script>
</body>
</html>
