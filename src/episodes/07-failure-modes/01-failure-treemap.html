<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agent failure modes — treemap</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  body { font: 14px/1.4 ui-sans-serif, system-ui, sans-serif; background:#0b1220; color:#e2e8f0; margin:0; padding:24px; }
  h1 { font-weight: 600; font-size: 1.4rem; }
  p { max-width: 780px; color:#94a3b8; }
  svg { background:#0f172a; border-radius:8px; }
  .cell rect { stroke: #0b1220; }
  .cell text { fill: #f8fafc; pointer-events:none; }
  .small  { font-size: 11px; fill: #cbd5e1; }
</style>
</head>
<body>
<h1>Where the failures actually are</h1>
<p>A treemap of an illustrative production sample. Sub-rectangles are
specific causes inside each bucket. Swap the data for your own to see
what your distribution actually looks like — a bar chart would let
you ignore the dominant rectangle; a treemap won't.</p>

<svg id="chart" width="960" height="520"></svg>

<script>
const data = {
  name: "failures",
  children: [
    { name: "Tool (35%)", color: "#f97316", children: [
      { name: "wrong arguments", value: 14 },
      { name: "silent empty result", value: 9 },
      { name: "schema mismatch", value: 7 },
      { name: "rate-limited", value: 5 },
    ]},
    { name: "Perception (25%)", color: "#8b5cf6", children: [
      { name: "buried fact in noisy output", value: 12 },
      { name: "ambiguous units", value: 7 },
      { name: "inconsistent shape", value: 6 },
    ]},
    { name: "Planning (20%)", color: "#10b981", children: [
      { name: "ambiguous user query", value: 9 },
      { name: "conflicting objectives", value: 6 },
      { name: "missing context", value: 5 },
    ]},
    { name: "Memory (15%)", color: "#3b82f6", children: [
      { name: "summary dropped specifics", value: 7 },
      { name: "fact retrieval miss", value: 5 },
      { name: "context overflow", value: 3 },
    ]},
    { name: "Termination (5%)", color: "#ef4444", children: [
      { name: "spun past answer", value: 3 },
      { name: "quit too early", value: 2 },
    ]},
  ]
};

const W = 960, H = 520;
const svg = d3.select("#chart");

const root = d3.hierarchy(data)
  .sum(d => d.value || 0)
  .sort((a, b) => b.value - a.value);

d3.treemap().size([W, H]).paddingTop(22).paddingInner(2)(root);

const groups = svg.selectAll("g.bucket")
  .data(root.children)
  .join("g").attr("class", "bucket");

groups.append("rect")
  .attr("x", d => d.x0).attr("y", d => d.y0 - 22)
  .attr("width", d => d.x1 - d.x0).attr("height", 22)
  .attr("fill", d => d.data.color).attr("opacity", 0.9);

groups.append("text")
  .attr("x", d => d.x0 + 8).attr("y", d => d.y0 - 6)
  .style("font-weight", 600)
  .text(d => d.data.name);

const leaves = svg.selectAll("g.cell")
  .data(root.leaves())
  .join("g").attr("class", "cell")
  .attr("transform", d => `translate(${d.x0},${d.y0})`);

leaves.append("rect")
  .attr("width", d => d.x1 - d.x0)
  .attr("height", d => d.y1 - d.y0)
  .attr("fill", d => d.parent.data.color)
  .attr("opacity", 0.35);

leaves.append("text").attr("class", "small")
  .attr("x", 6).attr("y", 14)
  .text(d => d.data.name);

leaves.append("text").attr("class", "small")
  .attr("x", 6).attr("y", 28)
  .attr("opacity", 0.7)
  .text(d => `${d.value}`);
</script>
</body>
</html>
